<div class="comment">
  <wa-number-input
    id="commentBarXXX"
    class="list-input"
    placeholder="Bar"
    value="1"
    min="1"
    max="999"
    size="small"
  ></wa-number-input>
  <wa-number-input
    id="commentSubBarXXX"
    class="list-input"
    placeholder="Sub"
    value="1"
    min="1"
    max="300"
    size="small"
  ></wa-number-input>
  <wa-input
    class="commentMessage"
    id="commentMessageXXX"
    placeholder="Comment"
    value="Comment"
    size="small"
  ></wa-input>
  <wa-button id="removeCommentButtonXXX" class="remove-button" title="Remove comment">
    <wa-icon name="trash-can" label="Remove comment"></wa-icon>
  </wa-button>
</div>
