<div class="section">
  <wa-number-input
    title="Bar"
    class="list-input"
    type="number"
    id="barsXXX"
    placeholder="Bars"
    min="1"
    max="999"
    value="1"
    size="small"
  ></wa-number-input>
  <wa-number-input
    title="Count"
    class="list-input"
    type="number"
    id="bpmXXX"
    placeholder="BPM"
    min="1"
    max="300"
    value="60"
    size="small"
  ></wa-number-input>

  <wa-select
    title="Measure"
    name="measure"
    id="measureXXX"
    class="list-input"
    size="small"
  >
    <small>Quarter notes</small>
    <wa-option value="1/4">1/4</wa-option>
    <wa-option value="2/4">2/4</wa-option>
    <wa-option value="3/4">3/4</wa-option>
    <wa-option value="4/4">4/4</wa-option>
    <wa-option value="5/4">5/4</wa-option>
    <wa-option value="6/4">6/4</wa-option>
    <wa-divider></wa-divider>
    <small>Eighth notes</small>
    <wa-option value="4/8">4/8</wa-option>
    <wa-option value="6/8">6/8</wa-option>
    <wa-option value="7/8">7/8</wa-option>
    <wa-option value="8/8">8/8</wa-option>
    <wa-option value="9/8">9/8</wa-option>
  </wa-select>
  <wa-switch id="isPreXXX">Is PreCount</wa-switch>

  <wa-button id="removeSectionButtonXXX" class="remove-button" title="Remove section">
    <wa-icon name="trash-can" label="Remove section"></wa-icon>
